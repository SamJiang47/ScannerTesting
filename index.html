<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Code Scanner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app">
    <h1>&#128247; Code Scanner</h1>

    <div class="viewport" id="viewport">

      <div class="placeholder" id="placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07
               4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012
               2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <p>Tap the camera button to begin scanning</p>
      </div>

      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>

      <div class="vf" id="vf">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="scanline" id="scanline"></div>
    </div>

    <button class="btn btn-start" id="mainBtn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07
             4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012
             2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span id="btnLabel">Start Scanner</span>
    </button>

    <p class="status" id="statusMsg">Ready</p>
  </div>

  <!-- Result card — X button only close -->
  <div class="overlay" id="overlay">
    <div class="card">
      <button class="x-btn" id="xBtn" title="Close">&#10005;</button>
      <div class="check-wrap">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <div class="r-eyebrow">Scan Result</div>
      <div class="r-headline" id="rHeadline"></div>
      <div class="r-raw"      id="rRaw"></div>
      <div class="r-meta"     id="rMeta"></div>
    </div>
  </div>

  <script src="js/processor.js"></script>
  <script src="js/decoder-1d.js"></script>
  <script src="js/decoder-qr.js"></script>
  <script src="js/decoder-pdf417.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
